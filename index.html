<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Talent Nexus — Employee Portal</title>
<style>
:root { --bg:#08080c; --s:#0d0d14; --c:#111118; --t:#e8e8f0; --t2:#9a9ab2; --tm:#62627a; --gold:#c9a84c; --gold2:#a8882e; }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
body {
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--t); min-height:100vh; display:flex;
  align-items:center; justify-content:center; margin:0;
  background-image:
    radial-gradient(circle at 20% 10%,rgba(201,168,76,0.04),transparent 50%),
    radial-gradient(circle at 80% 90%,rgba(201,168,76,0.03),transparent 50%);
}
.card {
  text-align:center; animation:fadeUp .5s ease;
  background:rgba(22,22,34,0.8); backdrop-filter:blur(20px);
  border:1px solid rgba(201,168,76,0.1); border-radius:20px;
  padding:40px 30px; max-width:400px; width:100%;
  box-shadow:0 8px 48px rgba(0,0,0,.6);
}
.logo {
  width:48px; height:48px; background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:14px; margin:0 auto 16px; display:flex; align-items:center;
  justify-content:center; box-shadow:0 0 32px rgba(201,168,76,.25);
  font-size:18px; font-weight:900; color:#fff;
}
h1 { font-size:18px; font-weight:700; margin:0 0 4px; }
.sub { color:var(--tm); font-size:10px; margin-bottom:24px; }
.loader {
  width:28px; height:28px; border:2px solid rgba(201,168,76,0.15);
  border-top-color:var(--gold); border-radius:50%; animation:pulse 1.5s infinite;
  margin:0 auto 16px;
}
.msg { font-size:11px; color:var(--t2); }
a { color:var(--gold); text-decoration:none; font-size:11px; font-weight:600; }
a:hover { text-decoration:underline; }
</style>
<script>
var PORTAL_URL = "https://script.google.com/macros/s/AKfycbwmcwgEUU5dBaFiQkC0H1ZudIOkQUiiMOwdrLk6SevgdnkZTyndVrWz-yHmzGlK9A/exec";
setTimeout(function(){ window.location.href = PORTAL_URL; }, 1500);
</script>
</head>
<body>
<div class="card">
  <div class="logo">TN</div>
  <h1>Talent Nexus</h1>
  <div class="sub">Employee Self-Service Portal</div>
  <div class="loader"></div>
  <p class="msg">Redirecting to secure portal...</p>
  <p style="margin-top:16px"><a id="fallback">Continue to Portal</a></p>
</div>
<script>
document.getElementById("fallback").href = PORTAL_URL;
</script>
</body>
</html>
